<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .input-group { margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        .delete-btn { background-color: #dc3545; padding: 5px 10px; font-size: 14px; }
        .delete-btn:hover { background-color: #c82333; }
        .pagination { margin-top: 15px; display: flex; justify-content: center; gap: 15px; align-items: center; }
        .pagination button { background-color: #007bff; padding: 5px 15px; }
        .pagination button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 15% auto; padding: 20px; border-radius: 5px; width: 300px; text-align: center; }
        .modal-content select { width: 100%; padding: 8px; margin: 10px 0; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scan Transaction</h2>
    
    <div class="input-group">
        <input type="text" id="scanInput" placeholder="Scan transaction number here..." autofocus>
        <input type="text" id="searchInput" placeholder="Search transactions..." onkeyup="handleSearch(this.value)">
        <button onclick="openModal()" style="background-color: #007bff;">Select Truck</button>
        <button onclick="exportToExcel()">Export to Excel</button>
    </div>
    <div style="margin-bottom: 10px; font-weight: bold; color: #555;" id="truckDisplay">Current Truck: N/A</div>

    <table id="scanTable">
        <thead>
            <tr>
                <th>Transaction Number</th>
                <th>Timestamp</th>
                <th>Plate Number</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- Scanned items will appear here -->
        </tbody>
    </table>

    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="nextBtn" onclick="changePage(1)" disabled>Next</button>
    </div>
</div>

<!-- Modal for Truck Selection -->
<div id="plateModal" class="modal">
    <div class="modal-content">
        <h3>Select Plate Number</h3>
        <select id="plateSelect">
            <option value="">-- Select Plate --</option>
            <option value="ABC-1234">ABC-1234</option>
            <option value="XYZ-5678">XYZ-5678</option>
            <option value="TRK-9999">TRK-9999</option>
        </select>
        <div style="margin-top: 10px;">
            <button onclick="savePlate()">Save</button>
            <button onclick="closeModal()" style="background-color: #6c757d;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const scannedData = [];
    let searchTerm = "";
    let currentPage = 1;
    let currentPlate = "N/A";
    const rowsPerPage = 10;
    const input = document.getElementById('scanInput');
    const tbody = document.querySelector('#scanTable tbody');

    let scanTimeout;

    function processScan() {
        const value = input.value.trim();
        if (value) {
            if (scannedData.some(item => item["Transaction Number"] === value)) {
                playErrorSound();
                setTimeout(() => alert("Duplicate transaction detected!"), 50);
                input.value = '';
                return;
            }
            playSuccessSound();
            addTransaction(value);
            input.value = ''; // Clear input for next scan
        }
    }

    // Listen for 'Enter' key, which scanners usually send after a scan
    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            clearTimeout(scanTimeout);
            processScan();
        }
    });

    // Auto-submit after scan (detects end of typing/scanning)
    input.addEventListener('input', function() {
        clearTimeout(scanTimeout);
        scanTimeout = setTimeout(processScan, 200); // 200ms delay to wait for scanner to finish
    });

    function addTransaction(number) {
        const now = new Date();
        const timestamp = now.toLocaleString();

        const dataItem = { "Transaction Number": number, "Timestamp": timestamp, "Plate Number": currentPlate };

        // Add to data array for export
        scannedData.unshift(dataItem);
        
        currentPage = 1;
        renderTable();
    }

    function handleSearch(val) {
        searchTerm = val.toLowerCase();
        currentPage = 1; // Reset to first page on search
        renderTable();
    }

    function renderTable() {
        tbody.innerHTML = '';
        const filteredData = scannedData.filter(item => 
            item["Transaction Number"].toLowerCase().includes(searchTerm)
        );
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageItems = filteredData.slice(start, end);

        pageItems.forEach(item => {
            const row = tbody.insertRow();
            const cell1 = row.insertCell(0);
            const cell2 = row.insertCell(1);
            const cell3 = row.insertCell(2);
            const cell4 = row.insertCell(3);
            cell1.textContent = item["Transaction Number"];
            cell2.textContent = item["Timestamp"];
            cell3.textContent = item["Plate Number"];

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.className = 'delete-btn';
            deleteBtn.onclick = function() {
                const index = scannedData.indexOf(item);
                if (index > -1) scannedData.splice(index, 1);
                // Check if current page is empty after deletion
                const currentFiltered = scannedData.filter(i => i["Transaction Number"].toLowerCase().includes(searchTerm));
                const totalPages = Math.ceil(currentFiltered.length / rowsPerPage) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                renderTable();
            };
            cell4.appendChild(deleteBtn);
        });
        updatePagination(filteredData.length);
    }

    function updatePagination(totalItems) {
        const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
    }

    function exportToExcel() {
        if (scannedData.length === 0) {
            alert("No data to export!");
            return;
        }
        
        // Create a new workbook and worksheet
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(scannedData);

        // Append worksheet to workbook
        XLSX.utils.book_append_sheet(wb, ws, "Transactions");

        // Generate Excel file
        XLSX.writeFile(wb, "scanned_transactions.xlsx");
    }

    // Audio Context for sound effects
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSuccessSound() {
        // Resume context if suspended (browser autoplay policy)
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); // 1000Hz (High beep)
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    function playErrorSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'sawtooth'; // Harsher sound
        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // 150Hz (Low buzz)
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.3);
    }

    function openModal() {
        document.getElementById('plateModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('plateModal').style.display = 'none';
    }

    function savePlate() {
        currentPlate = document.getElementById('plateSelect').value || "N/A";
        document.getElementById('truckDisplay').textContent = "Current Truck: " + currentPlate;
        closeModal();
        document.getElementById('scanInput').focus();
    }
</script>

</body>
</html>
